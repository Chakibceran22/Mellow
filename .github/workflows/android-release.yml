name: Android Release

# Builds a release APK + AAB and publishes a GitHub Release when a v* tag is pushed.
# You can also trigger it manually from the Actions tab (build only, no release).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android release
    runs-on: ubuntu-latest
    env:
      # Optional release signing. Set these repo secrets to produce a Play-Store
      # signable build; if ANDROID_KEYSTORE_BASE64 is empty the build falls back
      # to the committed debug keystore (installable, but not Play-publishable).
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install npm dependencies
        run: npm ci

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006"

      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload.keystore
          {
            echo "MELLOW_UPLOAD_STORE_FILE=upload.keystore"
            echo "MELLOW_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "MELLOW_UPLOAD_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "MELLOW_UPLOAD_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> android/gradle.properties

      - name: Build release APK and AAB
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Collect artifacts
        id: artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/Mellow-${VERSION}.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "dist/Mellow-${VERSION}.aab"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mellow-android-${{ steps.artifacts.outputs.version }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Mellow ${{ steps.artifacts.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
